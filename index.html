<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1525;
    --teal: #5E8B76;
    --teal-dim: #3a5a4e;
    --teal-pale: rgba(94,139,118,0.13);
    --teal-border: rgba(94,139,118,0.35);
    --text: #e8e0d0;
    --text-dim: #9a9080;
    --text-faint: #4a5060;
    --line: rgba(200,180,140,0.10);
    --error: #c46a4a;
    --gold: #c9a563;
    --gold-dim: #8a6d3a;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Туман */
  .fog { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.17; }
  .fog-1 { width: 520px; height: 420px; background: radial-gradient(ellipse, #2d6b5a 0%, transparent 70%); top: -10%; left: -8%; animation: drift1 18s ease-in-out infinite alternate; }
  .fog-2 { width: 380px; height: 380px; background: radial-gradient(ellipse, #1e4d40 0%, transparent 70%); top: 40%; right: -10%; animation: drift2 22s ease-in-out infinite alternate; }
  .fog-3 { width: 300px; height: 280px; background: radial-gradient(ellipse, #3a7a62 0%, transparent 70%); bottom: 5%; left: 25%; animation: drift3 16s ease-in-out infinite alternate; }
  .fog-4 { width: 200px; height: 200px; background: radial-gradient(ellipse, #1a3d32 0%, transparent 70%); top: 20%; left: 55%; animation: drift1 25s ease-in-out infinite alternate-reverse; }
  @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.08); } }
  @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-20px,-30px) scale(1.05); } }
  @keyframes drift3 { from { transform: translate(0,0) scale(1); } to { transform: translate(15px,-20px) scale(1.1); } }

  /* Переключатель языка */
  .lang-bar {
    position: fixed;
    top: 18px; right: 20px;
    display: flex;
    gap: 8px;
    z-index: 100;
    animation: fadeIn 1s ease;
  }
  .lang-btn {
    font-size: 22px;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s, transform 0.2s;
    border: none;
    background: rgba(255,255,255,0.08);
    padding: 4px 6px;
    line-height: 1;
    border-radius: 4px;
  }
  .lang-btn:hover { opacity: 1; transform: scale(1.15); background: rgba(255,255,255,0.15); }
  .lang-btn.active { opacity: 1; transform: scale(1.2); background: rgba(255,255,255,0.18); }

  /* Контейнер */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 36px 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Логотип сверху */
  .logo-wrap {
    margin-bottom: 16px;
    text-align: center;
    width: 100%;
  }
  .logo-img {
    width: 360px;
    max-width: 92vw;
    opacity: 0.96;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
    filter: drop-shadow(0 0 24px rgba(94,139,118,0.2));
    animation: fadeIn 1.2s ease;
  }

  /* Подзаголовок */
  .tagline {
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 32px;
    text-align: center;
    animation: fadeIn 1.5s ease;
  }

  /* Форма */
  .form-box {
    width: 100%;
    background: rgba(13,21,37,0.72);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 30px 26px;
    backdrop-filter: blur(10px);
    animation: slideUp 0.9s ease;
  }

  .form-title {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 24px;
    text-align: center;
    opacity: 0.88;
  }

  .field { margin-bottom: 15px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 7px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
  }

  input {
    width: 100%;
    background: var(--teal-pale);
    border: 1px solid var(--teal-border);
    color: var(--teal);
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input:focus { border-color: var(--teal); background: rgba(94,139,118,0.18); }
  input::placeholder { color: rgba(94,139,118,0.38); font-size: 13px; }
  input#inp-promo { letter-spacing: 2px; font-family: 'Courier New', monospace; font-size: 13px; text-transform: uppercase; }

  .btn {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: inherit;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s;
  }
  .btn:hover { background: var(--teal); color: var(--bg); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.loading .lbl { display: none; }
  .btn.loading .spin { display: inline; }
  .btn .spin { display: none; }

  .msg { margin-top: 14px; font-size: 12px; text-align: center; min-height: 18px; line-height: 1.6; display: none; }
  .msg.error { color: var(--error); display: block; }
  .msg.success { color: var(--teal); display: block; }

  .divider { width: 100%; height: 1px; background: var(--line); margin: 20px 0; }

  .beta-note { font-size: 11px; color: var(--text-faint); text-align: center; line-height: 1.8; letter-spacing: 0.5px; }

  /* Уже вошёл */
  .already-in { display: none; text-align: center; }
  .welcome { font-size: 20px; color: var(--gold); margin-bottom: 8px; }
  .sub-welcome { font-size: 11px; color: var(--text-dim); margin-bottom: 20px; letter-spacing: 1.5px; text-transform: uppercase; }
  .count { font-size: 48px; color: var(--teal); line-height: 1; margin-bottom: 4px; }
  .count-label { font-size: 10px; color: var(--text-faint); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
  .btn-open {
    display: inline-block; padding: 13px 36px;
    border: 1px solid var(--teal); color: var(--teal);
    font-family: inherit; font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; cursor: pointer;
    background: transparent; border-radius: 2px;
    transition: all 0.25s; text-decoration: none;
  }
  .btn-open:hover { background: var(--teal); color: var(--bg); }

  .note { margin-top: 24px; font-size: 11px; color: var(--text-faint); text-align: center; line-height: 1.8; }
  .note a { color: var(--gold-dim); text-decoration: none; }
  .note a:hover { color: var(--gold); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 480px) {
    .form-box { padding: 22px 16px; }
    .logo-img { width: 240px; }
    .lang-btn { font-size: 20px; }
  }
.input-error{border-color:var(--error) !important;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}

<!-- Кастомный сплэш-экран: тёмно-синий фон, логотип плавно проявляется 2 сек, держится 1 сек, затем уходит -->
<div id="splash-screen" style="position:fixed;inset:0;background:#0d1525;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.8s ease;">
  <img src="logo_FINAL_v41.png" alt="AION Vi" id="splash-logo" style="width:320px;max-width:60vw;opacity:0;transition:opacity 3s ease;mask-image:radial-gradient(ellipse 55% 55% at 50% 50%,black 30%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse 55% 55% at 50% 50%,black 30%,transparent 75%);">
</div>
<script>
(function() {
  var overlay = document.getElementById('splash-screen');
  var logo = document.getElementById('splash-logo');
  var audio;
  try {
    audio = new Audio('splash-sound.mp3');
  } catch(e) {}

  window.addEventListener('load', function() {
    // Появление логотипа (2 сек, CSS transition)
    requestAnimationFrame(function() {
      logo.style.opacity = '1';
    });
    // Пробуем звук синхронно — если браузер заблокирует автовоспроизведение, просто тихо игнорируем
    if (audio) {
      audio.play().catch(function(){});
    }
    // 2 сек появление + 1 сек пауза = 3 сек, затем уходим
    setTimeout(function() {
      overlay.style.opacity = '0';
      setTimeout(function() {
        overlay.style.display = 'none';
      }, 800);
    }, 5000);
  });
})();
</script>

const SERVER = 'https://aion-vi-server-production.up.railway.app';
let currentLang = 'en';

const FONT_SCALES = [1, 1.15, 1.3, 1.45];
function applyFontScale(idx) {
  idx = Math.max(0, Math.min(FONT_SCALES.length - 1, idx));
  document.body.style.zoom = FONT_SCALES[idx];
  localStorage.setItem('aion_font_scale_idx', idx);
}
function adjustFontScale(direction) {
  let idx = parseInt(localStorage.getItem('aion_font_scale_idx') || '0');
  applyFontScale(idx + direction);
}

function setLang(lang) {
  currentLang = lang;
  const T = TRANSLATIONS[lang];

  // Флаги
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  const flags = { en: 0, uk: 1, pl: 2, ru: 3 };
  document.querySelectorAll('.lang-btn')[flags[lang]].classList.add('active');

  // Тексты
  document.getElementById('t-tagline').textContent = T.tagline;
  document.getElementById('t-form-title').textContent = T.formTitle;
  document.getElementById('t-lbl-nickname').textContent = T.lblNickname;
  document.getElementById('inp-nickname').placeholder = T.phNickname;
  document.getElementById('t-lbl-email').textContent = T.lblEmail;
  document.getElementById('inp-email').placeholder = T.phEmail;
  document.getElementById('t-lbl-promo').textContent = T.lblPromo;
  document.getElementById('inp-promo').placeholder = T.phPromo;
  document.getElementById('t-btn-enter').textContent = T.btnEnter;
  document.getElementById('t-beta-note').textContent = T.betaNote;
  const orEl = document.getElementById('t-or-signin');
  if (orEl) orEl.textContent = T.orSignIn;
  document.getElementById('t-sub-welcome').textContent = T.subWelcome;
  document.getElementById('t-count-label').textContent = T.countLabel;
  document.getElementById('t-btn-open').textContent = T.btnOpen;
  document.getElementById('t-logout').textContent = T.logout;
  document.getElementById('t-group-note').textContent = T.groupNote;

  // Обновляем приветствие если уже вошёл
  const user = getUser();
  if (user && user.nickname) {
    document.getElementById('welcome-name').textContent = T.welcome(user.nickname);
  }

  localStorage.setItem('aion_lang', lang);
}

// FIREBASE КОНФИГУРАЦИЯ
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAM1VKa9iaC4Ox1Fzx1e1bEgRdbjVxK4QY",
  authDomain: "aion-vi.firebaseapp.com",
  databaseURL: "https://aion-vi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "aion-vi",
  storageBucket: "aion-vi.firebasestorage.app",
  messagingSenderId: "422204652530",
  appId: "1:422204652530:web:23222b39b8ec3ffce3096b"
};

let db, auth;

function initFirebaseApp() {
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  auth = firebase.auth();
}

// ══════════════════════════════════════════════
// ПРОМОКОДЫ
// ══════════════════════════════════════════════
// Промокоды теперь проверяются на сервере (/redeem) — список тут больше не хранится
const ANALYSES_PER_CODE = 5;

// Локальное хранилище
function getUser() { try { return JSON.parse(localStorage.getItem('aion_user')); } catch { return null; } }
function saveUser(u) { localStorage.setItem('aion_user', JSON.stringify(u)); }
function getUsedCodes() { try { return JSON.parse(localStorage.getItem('aion_used_codes') || '[]'); } catch { return []; } }
function markCodeUsed(code) {
  const used = getUsedCodes();
  if (!used.includes(code)) { used.push(code); localStorage.setItem('aion_used_codes', JSON.stringify(used)); }
}

// ══════════════════════════════════════════════
// FIREBASE DATABASE
// ══════════════════════════════════════════════
function emailToKey(email) { return email.replace(/\./g,'_').replace(/@/g,'__at__'); }

async function saveUserToFirebase(user) {
  try {
    await db.ref('users/' + emailToKey(user.email)).set({
      nickname: user.nickname || '',
      email: user.email,
      promo: user.promo || 'social',
      analysesLeft: user.analysesLeft,
      registeredAt: user.registeredAt,
      lang: user.lang || 'ru',
      loginMethod: user.loginMethod || 'promo'
    });
  } catch(e) { console.warn('Firebase DB:', e.message); }
}

async function getUserFromFirebase(email) {
  try {
    const snap = await db.ref('users/' + emailToKey(email)).once('value');
    return snap.val();
  } catch(e) { return null; }
}

// ══════════════════════════════════════════════
// ВХОД ЧЕРЕЗ GOOGLE
// ══════════════════════════════════════════════
// Проверка имени ПЕРЕД входом через соцсети —
// без неё Google/Facebook дают только формальное имя из профиля, а не то,
// как человека называют друзья
function checkGateBeforeSocial() {
  const T = TRANSLATIONS[currentLang];
  const nickEl = document.getElementById('inp-nickname');
  nickEl.classList.remove('input-error');

  if (!nickEl.value.trim()) {
    showMsg(T.errName, 'error');
    nickEl.classList.add('input-error');
    nickEl.focus();
    return false;
  }
  return true;
}

async function signInWithGoogle() {
  if (!checkGateBeforeSocial()) return;
  try {
    const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    await handleSocialLogin(result.user, 'google');
  } catch(e) { showMsg(e.message, 'error'); }
}

// ══════════════════════════════════════════════
// ВХОД ЧЕРЕЗ FACEBOOK
// ══════════════════════════════════════════════
async function signInWithFacebook() {
  if (!checkGateBeforeSocial()) return;
  try {
    const result = await auth.signInWithPopup(new firebase.auth.FacebookAuthProvider());
    await handleSocialLogin(result.user, 'facebook');
  } catch(e) {
    if (e.code === 'auth/account-exists-with-different-credential') {
      showMsg('Email уже зарегистрирован через другой способ входа.', 'error');
    } else { showMsg(e.message, 'error'); }
  }
}

async function handleSocialLogin(firebaseUser, method) {
  const email = firebaseUser.email;
  // Берём то, что человек сам ввёл в форму — не гадаем по гугл-профилю
  const nickname = document.getElementById('inp-nickname').value.trim() || (firebaseUser.displayName || email).split(' ')[0];
  let existing = await getUserFromFirebase(email);
  if (existing) {
    saveUser({ ...existing, email });
    showMsg(`С возвращением, ${existing.nickname || nickname}!`, 'success');
  } else {
    const user = { nickname, email, promo: 'social-' + method, analysesLeft: ANALYSES_PER_CODE, analysesTotal: ANALYSES_PER_CODE,
      registeredAt: new Date().toISOString(), lang: currentLang, loginMethod: method };
    saveUser(user);
    await saveUserToFirebase(user);
    showMsg(TRANSLATIONS[currentLang].entering(nickname), 'success');
  }
  setTimeout(() => { window.location.href = 'calculator.html'; }, 1400);
}

// ══════════════════════════════════════════════
// ИНИЦИАЛИЗАЦИЯ
// ══════════════════════════════════════════════
window.onload = function() {
  const savedScale = parseInt(localStorage.getItem('aion_font_scale_idx') || '0');
  if (savedScale > 0) applyFontScale(savedScale);
  initFirebaseApp();
  const savedLang = localStorage.getItem('aion_lang') || 'en';
  setLang(savedLang);
  const user = getUser();
  if (user && user.email && user.analysesLeft > 0) {
    getUserFromFirebase(user.email).then(fb => {
      showAlreadyIn(fb ? { ...user, analysesLeft: fb.analysesLeft } : user);
    }).catch(() => showAlreadyIn(user));
  }
};

function showAlreadyIn(user) {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('already-in').style.display = 'block';
  document.getElementById('welcome-name').textContent = TRANSLATIONS[currentLang].welcome(user.nickname || '');
  document.getElementById('analyses-left').textContent = user.analysesLeft;
}

// ══════════════════════════════════════════════
// ВХОД ПО ПРОМОКОДУ
// ══════════════════════════════════════════════
async function enterApp() {
  const T = TRANSLATIONS[currentLang];
  const nickname = document.getElementById('inp-nickname').value.trim();
  const email    = document.getElementById('inp-email').value.trim().toLowerCase();
  const promo    = document.getElementById('inp-promo').value.trim().toUpperCase();
  const btn      = document.getElementById('btn-enter');
  showMsg('', '');
  if (!nickname)                     { showMsg(T.errName, 'error'); return; }
  if (!email || !email.includes('@')) { showMsg(T.errEmail, 'error'); return; }
  if (!promo)                        { showMsg(T.errPromo, 'error'); return; }
  btn.classList.add('loading'); btn.disabled = true;

  let redeemResult;
  try {
    const r = await fetch(`${SERVER}/redeem`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ code: promo })
    });
    redeemResult = await r.json();
  } catch(e) {
    showMsg(T.errConnection || 'Ошибка соединения с сервером', 'error');
    btn.classList.remove('loading'); btn.disabled = false; return;
  }

  if (!redeemResult.valid) {
    const msg = redeemResult.reason === 'used' ? T.errUsed : T.errNotFound;
    showMsg(msg, 'error'); btn.classList.remove('loading'); btn.disabled = false; return;
  }

  const user = { nickname, email, promo, analysesLeft: ANALYSES_PER_CODE, analysesTotal: ANALYSES_PER_CODE,
    registeredAt: new Date().toISOString(), lang: currentLang, loginMethod: 'promo' };
  saveUser(user); markCodeUsed(promo);
  await saveUserToFirebase(user);
  showMsg(T.entering(nickname), 'success');
  setTimeout(() => { window.location.href = 'calculator.html'; }, 1400);
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type ? `msg ${type}` : 'msg';
}

function logout() {
  auth.signOut().catch(() => {});
  localStorage.removeItem('aion_user');
  document.getElementById('already-in').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') enterApp(); });
</script>
